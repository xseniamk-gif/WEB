<!doctype html>
<html lang="en">

<head>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/Logo.png') }}" />
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>{{title}}</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Fonts -->
  <link href='https://fonts.googleapis.com/css?family=Passion+One' rel='stylesheet' type='text/css'>
  <link href='https://fonts.googleapis.com/css?family=Oxygen' rel='stylesheet' type='text/css'>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="{{ url_for('static', filename='plugins/fontawesome-free/css/all.min.css') }}">

  <style>
    .navbar-brand {
  font-size: 2rem !important;  /* было 1.5rem, увеличил до 2rem */
  font-weight: bold;  /* добавил жирность для большей заметности */
}
    /* Стили для карусели */
    .carousel-item {
      height: 1000px;
      background-color: #000;
    }
    .carousel-item img {
      object-fit: cover;
      height: 100%;
      width: 100%;
    }

    /* Стили для навбара - только увеличенный шрифт и полупрозрачность */
    .navbar {
      background-color: rgba(0, 0, 0, 255) !important;  /* Полупрозрачный чёрный фон */
      backdrop-filter: blur(10px);  /* Размытие фона */
      -webkit-backdrop-filter: blur(10px);
    }

    /* Увеличение шрифта для ссылок в навбаре */
    .navbar .nav-link {
      font-size: 1.7rem;
    }

    /* Увеличение шрифта для бренда */
    .navbar-brand {
      font-size: 1.7rem;
    }

    /* Увеличение шрифта для выпадающего меню */
    .dropdown-menu .dropdown-item {
      font-size: 1.7rem;
    }
    .navbar {font-size: 1.7rem;}
  </style>
</head>

<body class="hold-transition sidebar-mini">
  <nav class="navbar navbar-expand-lg bg-dark border-bottom" data-bs-theme="dark">
    <div class="container-fluid">
      <a class="navbar-brand text-white" href="#">Navbar</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown"
              aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNavDropdown">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link active text-white" aria-current="page" href="#">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-white" href="#">Features</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-white" href="#">Pricing</a>
          </li>
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle text-white" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
              Dropdown link
            </a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="#">Action</a></li>
              <li><a class="dropdown-item" href="#">Another action</a></li>
              <li><a class="dropdown-item" href="#">Something else here</a></li>
            </ul>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Основной контент -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
