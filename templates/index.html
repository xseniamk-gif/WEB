{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
  <div id="carouselExampleCaptions" class="carousel slide" data-bs-ride="carousel">
    <div class="carousel-indicators">
      <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
      <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="1" aria-label="Slide 2"></button>
      <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="2" aria-label="Slide 3"></button>
    </div>
    <div class="carousel-inner">
      <div class="carousel-item active">
        <img src="https://picsum.photos/id/100/1200/500" class="d-block w-100" alt="Пейзаж">
        <div class="carousel-caption d-none d-md-block">
          <h5>Добро пожаловать на Марс</h5>
          <p>Красная планета ждёт исследователей</p>
        </div>
      </div>
      <div class="carousel-item">
        <img src="https://picsum.photos/id/104/1200/500" class="d-block w-100" alt="Природа">
        <div class="carousel-caption d-none d-md-block">
          <h5>Удивительные пейзажи</h5>
          <p>Горы и каньоны Марса</p>
        </div>
      </div>
      <div class="carousel-item">
        <img src="https://picsum.photos/id/116/1200/500" class="d-block w-100" alt="Горы">
        <div class="carousel-caption d-none d-md-block">
          <h5>Исследования продолжаются</h5>
          <p>Новые горизонты Красной планеты</p>
        </div>
      </div>
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="prev">
      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Previous</span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="next">
      <span class="carousel-control-next-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Next</span>
    </button>
  </div>
</div>

<script>
  // Инициализация карусели (на случай, если автостарт не сработал)
  document.addEventListener('DOMContentLoaded', function() {
    var carousel = document.querySelector('#carouselExampleCaptions');
    if (carousel) {
      new bootstrap.Carousel(carousel, {
        interval: 3000,
        ride: 'carousel'
      });
    }
  });
</script>
{% endblock %}
